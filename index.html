<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>減量期間 自動計算ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2d7df6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #1f67d1;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      background: #eef3fb;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }

    .section-title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 35px;
      margin-bottom: 15px;
    }

    .timeline {
      max-width: 400px;
      margin: 0 auto 40px;
    }

    .week-card {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 0 8px rgba(0,0,0,0.08);
      margin-bottom: 12px;
    }

    .week-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
    }

    .week-note {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }

    .highlight-6m {
      border: 2px solid #19a34a;
      background: #eafff0;
    }

    .highlight-goal {
      border: 2px solid #f08a24;
      background: #fff5ea;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="header.png" style="width:100%; margin-bottom:20px;">

    <p style="text-align:center; font-size:14px; color:#333; line-height:1.8; margin-bottom:20px;">
      今の体重と目標体重を入れるだけで、<br>
      目標までの期間と、週ごとの体重推移が分かります。
    </p>

    <label>現在の体重（kg）</label>
    <input type="number" id="current" placeholder="例：75">

    <label>目標体重（kg）</label>
    <input type="number" id="target" placeholder="例：60">

    <label>1週間の減量ペース（kg）</label>
    <input type="number" id="pace" placeholder="例：0.5" step="0.1">

    <button onclick="calc()">計算する</button>

    <div id="result"></div>
    <div id="subResult" style="margin-top:10px; font-size:13px; color:#666; line-height:1.8;"></div>

    <div class="note">
      ※週0.5kg前後の減量が、無理の少ない目安です。<br>
      無理な減量は、継続しにくくリバウンドの原因にもなります。
    </div>
  </div>

  <div class="section-title">体重推移の目安</div>
  <div class="timeline" id="timeline"></div>

  <script>
    function calc() {
      const current = parseFloat(document.getElementById("current").value);
      const target = parseFloat(document.getElementById("target").value);
      const pace = parseFloat(document.getElementById("pace").value);

      if (!current || !target || !pace) {
        document.getElementById("result").innerText = "入力してください";
        document.getElementById("subResult").innerText = "";
        document.getElementById("timeline").innerHTML = "";
        return;
      }

      if (target >= current) {
        document.getElementById("result").innerText = "目標体重は現在体重より小さくしてください";
        document.getElementById("subResult").innerText = "";
        document.getElementById("timeline").innerHTML = "";
        return;
      }

      if (pace <= 0) {
        document.getElementById("result").innerText = "減量ペースは0より大きい数字を入力してください";
        document.getElementById("subResult").innerText = "";
        document.getElementById("timeline").innerHTML = "";
        return;
      }

      const diff = current - target;
      const weeks = diff / pace;
      const days = Math.round(weeks * 7);

      const goalDate = new Date();
      goalDate.setDate(goalDate.getDate() + days);

      const year = goalDate.getFullYear();
      const month = goalDate.getMonth() + 1;
      const date = goalDate.getDate();

      document.getElementById("result").innerText =
        `必要な減量：${diff.toFixed(1)}kg\n期間：${weeks.toFixed(1)}週間（約${days}日）`;

      document.getElementById("subResult").innerText =
        `目標到達予定日：${year}年${month}月${date}日ごろ\nこの期間を目安に継続していきましょう`;

      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";

      const totalWeeks = Math.ceil(weeks);

      for (let i = 1; i <= totalWeeks; i++) {
        const weight = current - (pace * i);

        const card = document.createElement("div");
        card.className = "week-card";

        let note = "";

        if (i === 1) {
          note = "スタート直後の最初の目安です";
        }
        if (i === 26) {
          note = "ここが6か月の目安です";
          card.classList.add("highlight-6m");
        }
        if (i === totalWeeks) {
          note = "ここが目標到達の目安です";
          card.classList.add("highlight-goal");
        }

        card.innerHTML = `
          <div class="week-row">
            <div>${i}週目</div>
            <div>${weight.toFixed(1)}kg</div>
          </div>
          ${note ? `<div class="week-note">${note}</div>` : ""}
        `;

        timeline.appendChild(card);
      }

      document.getElementById("result").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
