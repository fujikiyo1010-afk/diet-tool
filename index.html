<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>減量期間 自動計算ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --line: #dbe3ee;
      --primary: #2d7df6;
      --primary-dark: #1f67d1;
      --primary-soft: #eaf2ff;
      --success: #19a34a;
      --success-soft: #eafaf0;
      --goal: #f08a24;
      --goal-soft: #fff5ea;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(to bottom, #f7f9fc 0%, #eef4fb 100%);
      margin: 0;
      padding: 24px 16px 40px;
      color: var(--text);
    }

    .container {
      max-width: 420px;
      margin: 0 auto 24px;
      background: var(--card);
      padding: 22px 18px 20px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.75);
    }

    .hero-image {
      width: 100%;
      display: block;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .intro {
      text-align: center;
      font-size: 14px;
      color: #334155;
      line-height: 1.8;
      margin: 0 0 22px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 7px;
      padding-left: 2px;
    }

    input {
      width: 100%;
      height: 50px;
      padding: 0 14px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      background: #fbfdff;
      color: var(--text);
      outline: none;
      transition: 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(45, 125, 246, 0.12);
    }

    input::placeholder {
      color: #9aa5b1;
    }

    .button-wrap {
      margin-top: 18px;
    }

    button {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--primary) 0%, #4f9bff 100%);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      box-shadow: 0 10px 20px rgba(45, 125, 246, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(45, 125, 246, 0.26);
      background: linear-gradient(135deg, var(--primary-dark) 0%, #3f8df5 100%);
    }

    .guide-message {
      margin-top: 12px;
      font-size: 13px;
      color: var(--subtext);
      text-align: center;
      line-height: 1.7;
    }

    .result-card {
      margin-top: 18px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
      border: 1px solid #d9e8ff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      display: none;
    }

    .result-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-item {
      background: rgba(255,255,255,0.8);
      border: 1px solid #e5edf8;
      border-radius: 14px;
      padding: 12px;
    }

    .result-label {
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }

    .result-sub {
      font-size: 13px;
      color: #475569;
      line-height: 1.8;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e5edf8;
    }

    .progress-card {
      margin-top: 14px;
      background: #ffffff;
      border: 1px solid #e5edf8;
      border-radius: 16px;
      padding: 14px;
      display: none;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .progress-title {
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .progress-percent {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #e7eef8;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary) 0%, #69a8ff 100%);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.7;
    }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.8;
      background: #f8fafc;
      border: 1px solid #e6edf5;
      padding: 12px 14px;
      border-radius: 14px;
    }

    .section-title {
      max-width: 420px;
      margin: 0 auto 14px;
      text-align: center;
      font-size: 21px;
      font-weight: 800;
      color: var(--text);
    }

    .timeline {
      max-width: 420px;
      margin: 0 auto;
    }

    .week-card {
      background: var(--card);
      border-radius: 18px;
      padding: 15px 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #eef2f7;
      margin-bottom: 12px;
    }

    .week-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 700;
      gap: 12px;
    }

    .week-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .week-number {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
    }

    .week-date {
      font-size: 12px;
      color: var(--subtext);
      font-weight: 500;
    }

    .week-weight {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .week-note {
      margin-top: 9px;
      font-size: 13px;
      color: #475569;
      line-height: 1.7;
    }

    .highlight-6m {
      border: 2px solid var(--success);
      background: var(--success-soft);
    }

    .highlight-goal {
      border: 2px solid var(--goal);
      background: var(--goal-soft);
    }

    @media (max-width: 420px) {
      .result-grid {
        grid-template-columns: 1fr;
      }

      .result-value {
        font-size: 18px;
      }

      .week-row {
        align-items: flex-start;
      }

      .week-weight {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="cover.png" alt="減量ツール画像" class="hero-image">

    <p class="intro">
      今の体重と目標体重を入れるだけで、<br>
      目標までの期間と、週ごとの体重推移が分かります。
    </p>

    <div class="form-group">
      <label for="current">現在の体重（kg）</label>
      <input type="number" id="current" placeholder="例：75" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="target">目標体重（kg）</label>
      <input type="number" id="target" placeholder="例：60" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="pace">1週間の減量ペース（kg）</label>
      <input type="number" id="pace" placeholder="例：0.5" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
      <label for="startDate">開始日</label>
      <input type="date" id="startDate">
    </div>

    <div class="button-wrap">
      <button onclick="calc()">計算する</button>
    </div>

    <div class="guide-message" id="guideMessage">
      無理の少ないペースで、続けやすい計画を立てましょう。
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">計算結果</div>

      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">必要な減量</div>
          <div class="result-value" id="resultDiff">-</div>
        </div>
        <div class="result-item">
          <div class="result-label">目標までの期間</div>
          <div class="result-value" id="resultPeriod">-</div>
        </div>
      </div>

      <div class="result-sub" id="subResult"></div>
    </div>

    <div class="progress-card" id="progressCard">
      <div class="progress-top">
        <div class="progress-title">目標までの進み方</div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-note" id="progressNote"></div>
    </div>

    <div class="note">
      ※週0.5kg前後の減量が、無理の少ない目安です。<br>
      無理な減量は、継続しにくくリバウンドの原因にもなります。
    </div>
  </div>

  <div class="section-title">体重推移の目安</div>
  <div class="timeline" id="timeline"></div>

  <script>
    function formatDateJP(date) {
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      return `${y}年${m}月${d}日`;
    }

    function setTodayToStartDate() {
      const startDateInput = document.getElementById("startDate");
      if (!startDateInput.value) {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, "0");
        const day = String(today.getDate()).padStart(2, "0");
        startDateInput.value = `${year}-${month}-${day}`;
      }
    }

    function showError(message) {
      const resultCard = document.getElementById("resultCard");
      const progressCard = document.getElementById("progressCard");
      const guideMessage = document.getElementById("guideMessage");

      resultCard.style.display = "block";
      progressCard.style.display = "none";

      document.getElementById("resultDiff").innerText = "-";
      document.getElementById("resultPeriod").innerText = "-";
      document.getElementById("subResult").innerText = message;
      document.getElementById("timeline").innerHTML = "";
      guideMessage.innerText = "入力内容を確認して、もう一度計算してみましょう。";
    }

    function calc() {
      const current = parseFloat(document.getElementById("current").value);
      const target = parseFloat(document.getElementById("target").value);
      const pace = parseFloat(document.getElementById("pace").value);
      const startDateValue = document.getElementById("startDate").value;

      if (isNaN(current) || isNaN(target) || isNaN(pace)) {
        showError("現在の体重・目標体重・減量ペースを入力してください");
        return;
      }

      if (!startDateValue) {
        showError("開始日を入力してください");
        return;
      }

      if (target >= current) {
        showError("目標体重は現在体重より小さくしてください");
        return;
      }

      if (pace <= 0) {
        showError("減量ペースは0より大きい数字を入力してください");
        return;
      }

      const diff = current - target;
      const weeks = diff / pace;
      const days = Math.round(weeks * 7);

      const startDate = new Date(startDateValue);
      const goalDate = new Date(startDate);
      goalDate.setDate(goalDate.getDate() + days);

      const resultCard = document.getElementById("resultCard");
      const progressCard = document.getElementById("progressCard");
      const guideMessage = document.getElementById("guideMessage");
      const timeline = document.getElementById("timeline");

      resultCard.style.display = "block";
      progressCard.style.display = "block";

      document.getElementById("resultDiff").innerText = `${diff.toFixed(1)}kg`;
      document.getElementById("resultPeriod").innerText = `${weeks.toFixed(1)}週間`;

      document.getElementById("subResult").innerText =
        `約${days}日で到達予定です。\n目標到達予定日：${formatDateJP(goalDate)}ごろ`;

      const progressPercent = Math.min((pace / diff) * 100, 100);
      document.getElementById("progressFill").style.width = `${progressPercent}%`;
      document.getElementById("progressPercent").innerText = `${progressPercent.toFixed(1)}%`;
      document.getElementById("progressNote").innerText =
        `1週間あたり ${pace.toFixed(1)}kg ずつ進む想定です。`;

      if (pace <= 0.5) {
        guideMessage.innerText = "無理の少ない、続けやすいペースです。";
      } else if (pace <= 1.0) {
        guideMessage.innerText = "ややしっかりめのペースです。体調を見ながら進めましょう。";
      } else {
        guideMessage.innerText = "かなり速いペースです。無理のない範囲で計画を見直しましょう。";
      }

      timeline.innerHTML = "";

      const normalWeeks = Math.ceil(weeks);

      for (let i = 0; i < normalWeeks; i++) {
        const weekDate = new Date(startDate);
        weekDate.setDate(weekDate.getDate() + i * 7);

        let displayWeight;
        if (i === normalWeeks - 1) {
          displayWeight = target;
        } else {
          displayWeight = current - (pace * i);
          if (displayWeight < target) {
            displayWeight = target;
          }
        }

        const card = document.createElement("div");
        card.className = "week-card";

        let note = "";

        if (i === 0) {
          note = "スタート時点の体重です";
        }

        if (i === 25) {
          note = "ここが6か月の目安です";
          card.classList.add("highlight-6m");
        }

        if (i === normalWeeks - 1) {
          note = "ここが目標到達の目安です";
          card.classList.add("highlight-goal");
        }

        card.innerHTML = `
          <div class="week-row">
            <div class="week-left">
              <div class="week-number">${i + 1}週目</div>
              <div class="week-date">${formatDateJP(weekDate)}</div>
            </div>
            <div class="week-weight">${displayWeight.toFixed(1)}kg</div>
          </div>
          ${note ? `<div class="week-note">${note}</div>` : ""}
        `;

        timeline.appendChild(card);
      }

      resultCard.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      setTodayToStartDate();
    });
  </script>

</body>
</html>
